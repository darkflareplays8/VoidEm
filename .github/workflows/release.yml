name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-installer:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable-x86_64-pc-windows-msvc

      - name: Sync version from release.json
        shell: pwsh
        run: |
          $rel = Get-Content release.json | ConvertFrom-Json
          $ver = $rel.version
          $conf = Get-Content installer/src-tauri/tauri.conf.json | ConvertFrom-Json
          $conf.version = $ver
          $conf | ConvertTo-Json -Depth 10 | Set-Content installer/src-tauri/tauri.conf.json
          Write-Host "Set installer version to $ver"

      - run: cd installer && npm install && npm run build
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Get version
        id: ver
        shell: pwsh
        run: |
          $rel = Get-Content release.json | ConvertFrom-Json
          echo "VERSION=$($rel.version)" >> $env:GITHUB_OUTPUT

      - uses: softprops/action-gh-release@v2
        with:
          name: VoidEmulator v${{ steps.ver.outputs.VERSION }}
          body: |
            ## VoidEmulator v${{ steps.ver.outputs.VERSION }}
            **Download VoidInstaller-Setup.exe** to install VoidEmulator on your PC.
            The installer sets everything up automatically.
            Support: https://discord.gg/XUe82svaAr
          files: installer/src-tauri/target/release/bundle/nsis/*.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-emulator:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable-x86_64-pc-windows-msvc

      - name: Sync version from release.json
        shell: pwsh
        run: |
          $rel = Get-Content release.json | ConvertFrom-Json
          $ver = $rel.version
          $conf = Get-Content emulator/src-tauri/tauri.conf.json | ConvertFrom-Json
          $conf.version = $ver
          $conf | ConvertTo-Json -Depth 10 | Set-Content emulator/src-tauri/tauri.conf.json
          # Also update CURRENT_VERSION in lib.rs
          (Get-Content emulator/src-tauri/src/lib.rs) -replace 'const CURRENT_VERSION: &str = "[^"]*"', "const CURRENT_VERSION: &str = `"$ver`"" | Set-Content emulator/src-tauri/src/lib.rs
          Write-Host "Set emulator version to $ver"

      - run: cd emulator && npm install && npm run build
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Get version
        id: ver
        shell: pwsh
        run: |
          $rel = Get-Content release.json | ConvertFrom-Json
          echo "VERSION=$($rel.version)" >> $env:GITHUB_OUTPUT

      - uses: softprops/action-gh-release@v2
        with:
          files: emulator/src-tauri/target/release/VoidEmulator.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}