name: Release
on:
  push:
    tags:
      - 'v*'
permissions:
  contents: write
jobs:
  build-installer:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable-x86_64-pc-windows-msvc
      - name: Sync version from release.json
        shell: pwsh
        run: |
          $rel = Get-Content release.json | ConvertFrom-Json
          $ver = $rel.version
          $conf = Get-Content installer/src-tauri/tauri.conf.json | ConvertFrom-Json
          $conf.version = $ver
          $conf | ConvertTo-Json -Depth 10 | Set-Content installer/src-tauri/tauri.conf.json
          Write-Host "Set installer version to $ver"
      - name: Install and build
        shell: pwsh
        run: |
          cd installer
          npm install
          npm run build
      - name: Confirm build output
        shell: pwsh
        run: |
          $files = Get-ChildItem -Recurse -Filter "*.exe" | Select-Object FullName, Length
          $files | ForEach-Object { Write-Host "Found: $($_.FullName) ($([math]::Round($_.Length/1MB, 2)) MB)" }
      - name: Get version
        id: ver
        shell: bash
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
      - name: Upload release
        uses: softprops/action-gh-release@v2
        with:
          name: VoidEmulator v${{ steps.ver.outputs.VERSION }}
          body: |
            ## VoidEmulator v${{ steps.ver.outputs.VERSION }}
            **Download VoidInstaller-Setup.exe** to install VoidEmulator on your PC.
            The installer sets everything up automatically.
            Support: https://discord.gg/XUe82svaAr
          files: target/release/bundle/nsis/VoidInstaller_*_x64-setup.exe
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-emulator:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable-x86_64-pc-windows-msvc
      - name: Sync version from release.json
        shell: pwsh
        run: |
          $rel = Get-Content release.json | ConvertFrom-Json
          $ver = $rel.version
          $conf = Get-Content emulator/src-tauri/tauri.conf.json | ConvertFrom-Json
          $conf.version = $ver
          $conf | ConvertTo-Json -Depth 10 | Set-Content emulator/src-tauri/tauri.conf.json
          (Get-Content emulator/src-tauri/src/lib.rs) -replace 'const CURRENT_VERSION: &str = "[^"]*"', "const CURRENT_VERSION: &str = `"$ver`"" | Set-Content emulator/src-tauri/src/lib.rs
          Write-Host "Set emulator version to $ver"
      - name: Install and build
        shell: pwsh
        run: |
          cd emulator
          npm install
          npm run build
      - name: Confirm build output
        shell: pwsh
        run: |
          $files = Get-ChildItem -Recurse -Filter "*.exe" | Select-Object FullName, Length
          $files | ForEach-Object { Write-Host "Found: $($_.FullName) ($([math]::Round($_.Length/1MB, 2)) MB)" }
      - name: Get version
        id: ver
        shell: bash
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
      - name: Upload release
        uses: softprops/action-gh-release@v2
        with:
          files: target/release/voidemulator.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}