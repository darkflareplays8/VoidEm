name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable-x86_64-pc-windows-msvc

      - name: Install dependencies
        run: npm install

      - name: Build Tauri app
        run: npm run build
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
        shell: bash

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: VoidEmulator v${{ steps.version.outputs.VERSION }}
          body: |
            ## VoidEmulator v${{ steps.version.outputs.VERSION }}
            
            Multi-instance Android emulator for Windows.
            
            ### Install
            Download and run `VoidEmulator_${{ steps.version.outputs.VERSION }}_x64-setup.exe`
            
            On first launch it will automatically download QEMU, ADB and Android-x86.
            
            ### Support
            https://discord.gg/XUe82svaAr
          files: |
            src-tauri/target/release/bundle/nsis/*.exe
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}