<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>VoidEmulator</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=VT323&family=Rajdhani:wght@400;600;700&display=swap');
  :root {
    --void: #07030f; --surface: #0d0a1c; --border: #2a1a4a;
    --accent: #8b2fc9; --accent2: #c044ff; --glow: #d580ff;
    --dim: #4a3a6a; --text: #c8b8e8; --green: #50dc78; --red: #ff4444; --yellow: #ffc832;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:var(--void); color:var(--text); font-family:'Rajdhani',sans-serif; height:100vh; overflow:hidden; display:flex; flex-direction:column; }
  .header { display:flex; align-items:center; justify-content:space-between; padding:12px 20px; border-bottom:1px solid var(--border); background:var(--surface); }
  .logo { font-family:'VT323',monospace; font-size:28px; color:var(--glow); letter-spacing:4px; text-shadow:0 0 15px var(--accent); }
  .header-btns { display:flex; gap:8px; }
  .hbtn { padding:6px 14px; border:1px solid var(--border); background:transparent; color:var(--text); font-family:'Rajdhani',sans-serif; font-size:12px; font-weight:600; letter-spacing:2px; text-transform:uppercase; cursor:pointer; border-radius:3px; transition:all 0.2s; }
  .hbtn:hover { border-color:var(--accent); color:var(--glow); }
  .hbtn.discord { background:#5865F2; border-color:#5865F2; color:white; display:flex; align-items:center; gap:5px; }
  .hbtn.discord:hover { background:#4752c4; }
  .hbtn.new-instance { background:linear-gradient(135deg,#3d1270,#6a20b0); border-color:var(--accent2); color:var(--glow); }
  .hbtn:disabled { opacity:0.5; cursor:not-allowed; }
  #not-ready { display:none; flex:1; align-items:center; justify-content:center; flex-direction:column; gap:16px; }
  #not-ready .title { font-family:'VT323',monospace; font-size:42px; color:var(--red); letter-spacing:4px; }
  #not-ready p { color:var(--dim); font-size:14px; letter-spacing:2px; }
  #main { display:flex; flex:1; overflow:hidden; }
  .sidebar { width:220px; background:var(--surface); border-right:1px solid var(--border); display:flex; flex-direction:column; padding:12px; gap:8px; overflow-y:auto; }
  .sidebar-title { font-size:10px; color:var(--dim); letter-spacing:3px; text-transform:uppercase; padding:4px 0; }
  .instance-card { padding:10px 12px; border:1px solid var(--border); border-radius:4px; cursor:pointer; transition:all 0.2s; }
  .instance-card:hover, .instance-card.active { border-color:var(--accent); background:rgba(139,47,201,0.1); }
  .instance-name { font-size:13px; font-weight:600; color:var(--text); }
  .instance-status { font-size:10px; color:var(--dim); letter-spacing:1px; margin-top:2px; }
  .instance-status.running { color:var(--green); }
  .viewer { flex:1; display:flex; align-items:center; justify-content:center; background:#020109; position:relative; }
  .viewer-placeholder { text-align:center; color:var(--dim); }
  .viewer-placeholder .big { font-family:'VT323',monospace; font-size:48px; color:var(--border); letter-spacing:4px; }
  #screen { max-width:100%; max-height:100%; object-fit:contain; display:none; }
  .controls { width:180px; background:var(--surface); border-left:1px solid var(--border); padding:12px; display:flex; flex-direction:column; gap:8px; }
  .ctrl-title { font-size:10px; color:var(--dim); letter-spacing:3px; text-transform:uppercase; }
  .ctrl-btn { padding:8px; border:1px solid var(--border); background:transparent; color:var(--text); font-family:'Rajdhani',sans-serif; font-size:11px; font-weight:600; letter-spacing:2px; text-transform:uppercase; cursor:pointer; border-radius:3px; transition:all 0.2s; width:100%; }
  .ctrl-btn:hover:not(:disabled) { border-color:var(--accent); color:var(--glow); }
  .ctrl-btn:disabled { opacity:0.4; cursor:not-allowed; }
  .ctrl-btn.start { border-color:var(--green); color:var(--green); }
  .ctrl-btn.stop { border-color:var(--red); color:var(--red); }
  .modal-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.7); z-index:200; align-items:center; justify-content:center; }
  .modal-overlay.show { display:flex; }
  .modal { background:var(--surface); border:1px solid var(--border); padding:24px; border-radius:6px; min-width:300px; }
  .modal h3 { font-family:'VT323',monospace; font-size:24px; color:var(--glow); letter-spacing:3px; margin-bottom:12px; }
  .modal input { width:100%; padding:8px 12px; background:var(--void); border:1px solid var(--border); color:var(--text); font-family:'Rajdhani',sans-serif; font-size:14px; border-radius:3px; margin-bottom:12px; }
  .modal-btns { display:flex; gap:8px; justify-content:flex-end; }
  .mbtn { padding:8px 20px; border:1px solid var(--border); background:transparent; color:var(--text); font-family:'Rajdhani',sans-serif; font-size:12px; font-weight:600; letter-spacing:2px; cursor:pointer; border-radius:3px; }
  .mbtn.confirm { background:linear-gradient(135deg,#3d1270,#6a20b0); border-color:var(--accent2); color:var(--glow); }
  .mbtn:disabled { opacity:0.5; cursor:not-allowed; }
  .status-bar { font-size:10px; color:var(--dim); letter-spacing:1px; padding:4px 0; min-height:20px; }
</style>
</head>
<body>

<div class="header">
  <div class="logo">VOIDEMULATOR</div>
  <div class="header-btns">
    <button class="hbtn new-instance" id="btn-new" onclick="showNewInstance()">+ New Instance</button>
    <button class="hbtn discord" onclick="openDiscord()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="white"><path d="M20.317 4.37a19.791 19.791 0 0 0-4.885-1.515.074.074 0 0 0-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 0 0-5.487 0 12.64 12.64 0 0 0-.617-1.25.077.077 0 0 0-.079-.037A19.736 19.736 0 0 0 3.677 4.37a.07.07 0 0 0-.032.027C.533 9.046-.32 13.58.099 18.057c.002.022.015.043.033.056a19.9 19.9 0 0 0 5.993 3.03.078.078 0 0 0 .084-.028c.462-.63.874-1.295 1.226-1.994a.076.076 0 0 0-.041-.106 13.107 13.107 0 0 1-1.872-.892.077.077 0 0 1-.008-.128 10.2 10.2 0 0 0 .372-.292.074.074 0 0 1 .077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 0 1 .078.01c.12.098.246.198.373.292a.077.077 0 0 1-.006.127 12.299 12.299 0 0 1-1.873.892.077.077 0 0 0-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 0 0 .084.028 19.839 19.839 0 0 0 6.002-3.03.077.077 0 0 0 .032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 0 0-.031-.03z"/></svg>
      Discord
    </button>
  </div>
</div>

<div id="not-ready">
  <div class="title">NOT READY</div>
  <p>Please run VoidInstaller first to set up the emulator.</p>
</div>

<div id="main">
  <div class="sidebar">
    <div class="sidebar-title">Instances</div>
    <div id="instance-list"></div>
  </div>
  <div class="viewer">
    <div class="viewer-placeholder" id="placeholder">
      <div class="big">VOID</div>
      <div style="font-size:12px;letter-spacing:3px;margin-top:8px;">Select an instance to start</div>
    </div>
    <img id="screen" alt="Android Screen" />
  </div>
  <div class="controls">
    <div class="ctrl-title">Controls</div>
    <button class="ctrl-btn start" id="btn-start" onclick="startSelected()">▶ Start</button>
    <button class="ctrl-btn stop" id="btn-stop" onclick="stopSelected()">■ Stop</button>
    <button class="ctrl-btn" id="btn-capture" onclick="captureScreen()">📷 Capture</button>
    <div class="status-bar" id="status"></div>
    <button class="ctrl-btn" id="btn-delete" onclick="deleteSelected()" style="border-color:var(--red);color:var(--red);margin-top:auto;">✕ Delete</button>
  </div>
</div>

<div class="modal-overlay" id="modal">
  <div class="modal">
    <h3>NEW INSTANCE</h3>
    <input type="text" id="instance-name-input" placeholder="Instance name..." maxlength="30" />
    <div class="modal-btns">
      <button class="mbtn" id="btn-cancel" onclick="closeModal()">Cancel</button>
      <button class="mbtn confirm" id="btn-create" onclick="createInstance()">Create</button>
    </div>
  </div>
</div>

<script>
const invoke = window.__TAURI__.core.invoke;

let instances = [];
let selectedName = null;
let screenInterval = null;
let busy = false;

function setStatus(msg) {
  document.getElementById('status').textContent = msg;
}

function setBusy(val, msg = '') {
  busy = val;
  document.getElementById('btn-start').disabled = val;
  document.getElementById('btn-stop').disabled = val;
  document.getElementById('btn-capture').disabled = val;
  document.getElementById('btn-delete').disabled = val;
  document.getElementById('btn-new').disabled = val;
  if (msg) setStatus(msg);
}

async function persistInstances() {
  await invoke('save_instances', { instances });
}

function renderInstances() {
  const list = document.getElementById('instance-list');
  if (instances.length === 0) {
    list.innerHTML = '<div style="color:var(--dim);font-size:11px;letter-spacing:1px;">No instances yet</div>';
    return;
  }
  list.innerHTML = instances.map(inst => `
    <div class="instance-card ${inst.name === selectedName ? 'active' : ''}" onclick="selectInstance('${inst.name}')">
      <div class="instance-name">${inst.name}</div>
      <div class="instance-status ${inst.running ? 'running' : ''}">${inst.running ? '● RUNNING' : '○ STOPPED'}</div>
    </div>
  `).join('');
}

function selectInstance(name) {
  if (busy) return;
  selectedName = name;
  renderInstances();
  const inst = instances.find(i => i.name === name);
  if (inst && inst.running) {
    document.getElementById('placeholder').style.display = 'none';
    document.getElementById('screen').style.display = 'block';
  } else {
    document.getElementById('screen').style.display = 'none';
    document.getElementById('placeholder').style.display = 'flex';
  }
  setStatus('');
}

function showNewInstance() {
  document.getElementById('modal').classList.add('show');
  setTimeout(() => document.getElementById('instance-name-input').focus(), 50);
}

function closeModal() {
  document.getElementById('modal').classList.remove('show');
  document.getElementById('instance-name-input').value = '';
}

async function createInstance() {
  const name = document.getElementById('instance-name-input').value.trim();
  if (!name) return;
  // Check for duplicate name
  if (instances.find(i => i.name === name)) {
    setStatus('Name already taken');
    return;
  }
  document.getElementById('btn-create').disabled = true;
  document.getElementById('btn-cancel').disabled = true;
  document.getElementById('btn-create').textContent = 'Creating...';
  const ok = await invoke('create_overlay', { name });
  document.getElementById('btn-create').disabled = false;
  document.getElementById('btn-cancel').disabled = false;
  document.getElementById('btn-create').textContent = 'Create';
  if (ok) {
    const index = instances.length;
    instances.push({ name, running: false, index });
    await persistInstances();
    renderInstances();
    selectInstance(name);
  } else {
    setStatus('Failed to create instance');
  }
  closeModal();
}

async function startSelected() {
  if (!selectedName || busy) return;
  const inst = instances.find(i => i.name === selectedName);
  if (!inst || inst.running) return;
  setBusy(true, 'Starting...');
  const ok = await invoke('start_qemu', { name: inst.name, index: inst.index });
  if (ok) {
    inst.running = true;
    await persistInstances();
    renderInstances();
    document.getElementById('placeholder').style.display = 'none';
    document.getElementById('screen').style.display = 'block';
    clearInterval(screenInterval);
    screenInterval = setInterval(doCapture, 2000);
    setStatus('Running');
  } else {
    setStatus('Failed to start');
  }
  setBusy(false);
}

async function stopSelected() {
  if (!selectedName || busy) return;
  const inst = instances.find(i => i.name === selectedName);
  if (!inst || !inst.running) return;
  setBusy(true, 'Stopping...');
  await invoke('stop_instance', { name: inst.name });
  inst.running = false;
  await persistInstances();
  clearInterval(screenInterval);
  screenInterval = null;
  document.getElementById('screen').style.display = 'none';
  document.getElementById('placeholder').style.display = 'flex';
  renderInstances();
  setStatus('Stopped');
  setBusy(false);
}

async function doCapture() {
  if (!selectedName) return;
  const inst = instances.find(i => i.name === selectedName);
  if (!inst || !inst.running) return;
  const adb_port = 5554 + inst.index * 2;
  const data = await invoke('capture_screen', { name: inst.name, adb_port });
  if (data) document.getElementById('screen').src = 'data:image/png;base64,' + data;
}

async function captureScreen() {
  if (!selectedName || busy) return;
  setBusy(true, 'Capturing...');
  await doCapture();
  setBusy(false, '');
}

async function deleteSelected() {
  if (!selectedName || busy) return;
  setBusy(true, 'Deleting...');
  await invoke('delete_instance', { name: selectedName });
  instances = instances.filter(i => i.name !== selectedName);
  // Re-index
  instances.forEach((inst, i) => inst.index = i);
  selectedName = null;
  clearInterval(screenInterval);
  screenInterval = null;
  document.getElementById('screen').style.display = 'none';
  document.getElementById('placeholder').style.display = 'flex';
  await persistInstances();
  renderInstances();
  setStatus('');
  setBusy(false);
}

async function openDiscord() {
  await invoke('open_discord');
}

document.getElementById('instance-name-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') createInstance();
  if (e.key === 'Escape') closeModal();
});

async function init() {
  if (!window.__TAURI__) return;
  const setup = await invoke('check_setup');
  if (!setup.qemu || !setup.image) {
    document.getElementById('main').style.display = 'none';
    document.querySelector('.header').style.display = 'none';
    document.getElementById('not-ready').style.display = 'flex';
    document.getElementById('not-ready').innerHTML += `<p style="font-size:10px;color:var(--red);margin-top:8px;">qemu:${setup.qemu} img:${setup.image}<br>${setup.qemu_path}<br>${setup.image_path}</p>`;
    return;
  }
  // Load instances from disk instead of localStorage
  const loaded = await invoke('load_instances');
  if (Array.isArray(loaded)) {
    // Mark all as stopped on load (QEMU processes don't survive app restart)
    instances = loaded.map(i => ({ ...i, running: false }));
    await persistInstances();
  }
  renderInstances();
}

init();
</script>
</body>
</html>
