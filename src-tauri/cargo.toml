[package]
name = "voidemulator"
version = "1.0.0"
description = "Multi-instance Android emulator manager"
authors = ["VoidHub"]
edition = "2021"

[package.metadata.bundle]
name = "VoidEmulator"
identifier = "com.voidemulator.app"

[lib]
name = "voidemulator_lib"
crate-type = ["cdylib", "rlib"]
[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
tauri = { version = "2", features = [] }
tauri-plugin-shell = "2"
tauri-plugin-fs = "2"
tauri-plugin-http = "2"
serde = { version = "1", features = ["derive"] }
serde_json = "1"

[profile.release]
panic = "abort"
codegen-units = 1
lto = true
opt-level = "s"
strip = true
