<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>VoidInstaller</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=VT323&family=Rajdhani:wght@400;600;700&display=swap');
  :root {
    --void: #07030f; --surface: #0d0a1c; --border: #2a1a4a;
    --accent: #8b2fc9; --accent2: #c044ff; --glow: #d580ff;
    --dim: #4a3a6a; --text: #c8b8e8; --green: #50dc78; --red: #ff4444; --yellow: #ffc832;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:var(--void); color:var(--text); font-family:'Rajdhani',sans-serif; height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:16px; padding:40px; user-select:none; overflow:hidden; }
  .title { font-family:'VT323',monospace; font-size:52px; color:var(--glow); text-shadow:0 0 30px var(--accent); letter-spacing:8px; }
  .sub { font-size:11px; color:var(--dim); letter-spacing:4px; text-transform:uppercase; }
  #status { font-size:13px; color:var(--dim); letter-spacing:2px; text-transform:uppercase; min-height:18px; text-align:center; transition:color 0.3s; }
  .progress-wrap { width:420px; }
  .bar-bg { height:6px; background:var(--surface); border:1px solid var(--border); border-radius:3px; overflow:hidden; }
  .bar { height:100%; background:linear-gradient(90deg,var(--accent),var(--accent2)); width:0%; transition:width 0.4s; box-shadow:0 0 8px var(--accent); }
  .steps { width:420px; display:grid; grid-template-columns:1fr 1fr; gap:4px 16px; }
  .step { font-size:11px; letter-spacing:1px; text-transform:uppercase; display:flex; align-items:center; gap:6px; }
  #log { width:420px; height:120px; background:#03020a; border:1px solid var(--border); padding:8px 10px; overflow-y:auto; font-family:'Consolas',monospace; font-size:10px; color:#7a9f7a; border-radius:3px; line-height:1.5; }
  #log::-webkit-scrollbar { width:3px; } #log::-webkit-scrollbar-thumb { background:var(--border); }
  .log-info { color:#7a9f7a; } .log-error { color:var(--red); } .log-ok { color:var(--green); }
  #launch-btn { display:none; padding:12px 40px; background:linear-gradient(135deg,#3d1270,#6a20b0); border:1px solid var(--accent2); color:var(--glow); font-family:'Rajdhani',sans-serif; font-size:15px; font-weight:700; letter-spacing:4px; text-transform:uppercase; cursor:pointer; border-radius:4px; transition:all 0.2s; }
  #launch-btn:hover { box-shadow:0 0 30px rgba(192,68,255,0.5); transform:translateY(-1px); }
  #discord-btn { position:fixed; bottom:16px; right:16px; padding:8px 16px; background:#5865F2; border:none; color:white; font-family:'Rajdhani',sans-serif; font-size:12px; font-weight:700; letter-spacing:2px; text-transform:uppercase; cursor:pointer; border-radius:4px; display:flex; align-items:center; gap:6px; transition:all 0.2s; }
  #discord-btn:hover { background:#4752c4; transform:translateY(-1px); }
</style>
</head>
<body>
<div class="title">VOIDINSTALLER</div>
<div class="sub">Setting up VoidEmulator on your system</div>
<div id="status">Initializing...</div>
<div class="progress-wrap">
  <div class="bar-bg"><div class="bar" id="bar"></div></div>
</div>
<div class="steps" id="steps"></div>
<div id="log"></div>
<button id="launch-btn" onclick="launchApp()">Launch VoidEmulator ▶</button>

<script>
const STEPS = [
  { label: 'QEMU',       done: 25 },
  { label: 'ADB Tools',  done: 47 },
  { label: 'Android',    done: 88 },
  { label: 'VoidEm.exe', done: 97 },
  { label: 'Shortcuts',  done: 100 },
];

let lastLogCount = 0;

function renderSteps(pct) {
  document.getElementById('steps').innerHTML = STEPS.map(s => {
    const done = pct >= s.done;
    const active = !done && pct >= s.done - 30;
    const color = done ? 'var(--green)' : active ? 'var(--yellow)' : 'var(--dim)';
    return '<div class="step" style="color:' + color + '"><span>' + (done?'✓':active?'◎':'○') + '</span><span>' + s.label + '</span></div>';
  }).join('');
}

function log(msg, type) {
  type = type || 'info';
  const el = document.getElementById('log');
  const t = new Date().toLocaleTimeString('en-GB', {hour12:false});
  const div = document.createElement('div');
  div.className = 'log-' + type;
  div.textContent = '[' + t + '] ' + msg;
  el.appendChild(div);
  el.scrollTop = el.scrollHeight;
}

function setStatus(msg, color) {
  const el = document.getElementById('status');
  el.textContent = msg;
  if (color) el.style.color = color;
}

renderSteps(0);

async function poll() {
  try {
    const invoke = window.__TAURI__.core.invoke;
    const result = await invoke('get_progress');
    const entries = result.log;

    // Only process new entries
    for (let i = lastLogCount; i < entries.length; i++) {
      const [msg, pct] = entries[i];
      document.getElementById('bar').style.width = Math.max(0, pct) + '%';
      setStatus(msg);
      renderSteps(pct);
      if (pct === -1) {
        log(msg, 'error');
        setStatus(msg, 'var(--red)');
      } else if (pct >= 100) {
        log(msg, 'ok');
        setStatus('Installation complete!', 'var(--green)');
        document.getElementById('launch-btn').style.display = 'block';
      } else {
        log(msg, 'info');
      }
    }
    lastLogCount = entries.length;

    if (!result.done) {
      setTimeout(poll, 500);
    }
  } catch(e) {
    log('Poll error: ' + e, 'error');
    setStatus('Error — see log', 'var(--red)');
  }
}

async function init() {
  try {
    if (!window.__TAURI__) {
      log('ERROR: Tauri API not found!', 'error');
      setStatus('Tauri API missing', 'var(--red)');
      return;
    }
    const invoke = window.__TAURI__.core.invoke;

    const installed = await invoke('check_installed');
    if (installed) {
      log('Already installed!', 'ok');
      setStatus('Already installed!', 'var(--green)');
      document.getElementById('bar').style.width = '100%';
      renderSteps(100);
      document.getElementById('launch-btn').style.display = 'block';
      return;
    }

    log('Starting installation...');
    await invoke('start_install');
    poll();
  } catch(e) {
    log('ERROR: ' + e, 'error');
    setStatus('Error — see log', 'var(--red)');
  }
}

window.launchApp = async function() {
  try {
    await window.__TAURI__.core.invoke('launch_app');
  } catch(e) {
    log('Launch error: ' + e, 'error');
  }
};

if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', init);
} else {
  init();
}
</script>
<button id="discord-btn" onclick="window.__TAURI__.shell.open('https://discord.gg/XUe82svaAr')">

  Discord
</button>
</body>
</html>
